<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Owl icon circle - dark theme: lighter fill so it pops -->
  <circle cx="24" cy="24" r="20" fill="#5B9BD5"/>
  <!-- Owl ears -->
  <polygon points="15,10 19,4 22,10" fill="#DBE2EF"/>
  <polygon points="26,10 29,4 33,10" fill="#DBE2EF"/>
  <!-- Owl face -->
  <ellipse cx="24" cy="25" rx="13" ry="11" fill="#1E3A5F"/>
  <!-- Left eye -->
  <circle cx="19" cy="23" r="4" fill="#F9F7F7"/>
  <circle cx="19" cy="23" r="2.2" fill="#DBE2EF"/>
  <circle cx="20" cy="22" r="0.7" fill="#F9F7F7"/>
  <!-- Right eye -->
  <circle cx="29" cy="23" r="4" fill="#F9F7F7"/>
  <circle cx="29" cy="23" r="2.2" fill="#DBE2EF"/>
  <circle cx="30" cy="22" r="0.7" fill="#F9F7F7"/>
  <!-- Beak -->
  <polygon points="22,27 26,27 24,30" fill="#5B9BD5"/>
  <!-- Wordmark - light ink for dark theme -->
  <text x="52" y="19" font-family="ui-monospace, 'Courier New', monospace" font-size="12" font-weight="700" fill="#F9F7F7" letter-spacing="2.5">S.E.N.S.O.</text>
  <text x="52" y="31" font-family="ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#93B8D8" letter-spacing="0.3">Sistema Educativo per</text>
  <text x="52" y="42" font-family="ui-sans-serif, system-ui, sans-serif" font-size="8.5" fill="#93B8D8" letter-spacing="0.3">Numeri, Spese e Obiettivi</text>
</svg>
