# prek / pre-commit configuration
# Install: prek install
# Run manually: prek run --all-files

repos:
  # ── Basic hygiene ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict

  # ── Pre-commit: fast TypeScript check (frontend) ──────────────
  - repo: local
    hooks:
      - id: frontend-tsc
        name: "Frontend TypeScript check"
        entry: bash -c 'cd senso && pnpm exec tsc -b --noEmit'
        language: system
        files: '^senso/src/.*\.(ts|tsx)$'
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-build
        name: "Frontend production build"
        entry: bash -c 'cd senso && pnpm build'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: backend-check
        name: "Backend import check"
        entry: bash -c 'docker compose run --rm api /app/.venv/bin/python -c "import app; print(\"ok\")"'
        language: system
        pass_filenames: false
        stages: [pre-push]
